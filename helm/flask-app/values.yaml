replicaCount: 2

image:
  registry: shaksacr.azurecr.io
  repository: flask-hello-world
  tag: "1.0"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: "flask-hello-world"

service:
  type: LoadBalancer
  port: 80
  targetPort: 5001

containerPort: 5001

env:
  FLASK_ENV: production

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
